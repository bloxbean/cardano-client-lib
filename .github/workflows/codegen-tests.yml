name: Codegen Tests

# Runs codegen tests for the annotation-processor module.
# These are self-contained — they run the annotation processor on blueprint POJOs
# during compilation and verify the generated converter classes compile correctly.
# No network calls or external services required.

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  codegen-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: 'true'
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # annotation-processor: self-contained — runs the annotation processor on blueprint POJOs
      # during compilation and verifies the generated converter classes. No network calls.
      - name: Run annotation-processor codegen tests (with shared type registry)
        run: ./gradlew :annotation-processor:codegenTest -PskipSigning=true --stacktrace

      - name: Run annotation-processor codegen tests (without shared type registry)
        run: ./gradlew :annotation-processor:codegenTestNoRegistry -PskipSigning=true --stacktrace
