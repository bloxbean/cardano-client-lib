apply plugin: 'scala'

dependencies {
    api project(':core-api')

    implementation libs.scala3.library
    implementation(libs.scalus.bloxbean.cardano.client.lib) {
        exclude group: 'com.bloxbean.cardano'
    }
    implementation(libs.scalus.cardano.ledger) {
        exclude group: 'com.bloxbean.cardano'
    }

    implementation project(':backend')
    implementation project(':quicktx')

    testImplementation project(':core')
    testImplementation project(':backend-modules:blockfrost')

    integrationTestImplementation project(':core')
    integrationTestImplementation project(':backend-modules:blockfrost')
    integrationTestImplementation project(':it-support')
}

// Java depends on Scala bridge classes: compile Scala first, then Java
// Break the default compileScala -> compileJava dependency
tasks.named('compileScala') {
    classpath = sourceSets.main.compileClasspath
}
tasks.named('compileJava') {
    dependsOn 'compileScala'
    classpath += files(tasks.named('compileScala').get().destinationDirectory)
}

// Include both Java and Scala sources in source JAR (override root's allJava-only config)
sourceJar {
    from(sourceSets.main.allSource) {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Cardano Client Lib - Scalus'
                description = 'Cardano Client Lib - Scalus Integration (offline ledger validation, script evaluation)'
            }
        }
    }
}
