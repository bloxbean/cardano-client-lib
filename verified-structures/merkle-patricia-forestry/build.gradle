plugins {
    id 'java-library'
    id 'me.champeau.jmh' version '0.7.1'
}

dependencies {
    api project(':verified-structures:verified-structures-core')
    api project(':crypto')
    api project(':plutus')
    implementation(libs.co.nstant.in.cbor)
    implementation(libs.jackson.databind)

    testImplementation project(':test-support')

    jmh(libs.jmh.core)
    jmh(libs.jmh.generator.annprocess)
}

jmh {
    includes = ['.*Benchmark.*']
    jmhVersion = '1.36'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Cardano Client Merkle Patricia Forestry'
                description = 'Cardano Client Lib - Merkle Patricia Forestry'
            }
        }
    }
}
