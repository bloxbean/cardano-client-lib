plugins {
    id 'java-library'
}

dependencies {
    api project(':verified-structures:merkle-patricia-forestry')
    api project(':verified-structures:rocksdb-core')
    implementation(libs.rocksdbjni)
    implementation(libs.slf4j.api)

    testImplementation project(':test-support')
    testImplementation(libs.slf4j.reload4j)
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Cardano Client Merkle Patricia Forestry RocksDB'
                description = 'Cardano Client Lib - Merkle Patricia Forestry RocksDB Backend'
            }
        }
    }
}
