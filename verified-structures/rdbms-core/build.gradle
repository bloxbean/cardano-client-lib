plugins {
    id 'java-library'
}

dependencies {
    api project(':verified-structures:verified-structures-core')
    implementation(libs.hikaricp)
    implementation(libs.slf4j.api)
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = 'Cardano Client Verified Structures RDBMS Core'
                description = 'Cardano Client Lib - Verified Data Structures RDBMS Core Backend'
            }
        }
    }
}
